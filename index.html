<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cut</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="tab-today"   class="tab-content active"></div>
    <div id="tab-history" class="tab-content"></div>
    <div id="tab-trends"  class="tab-content"></div>
    <div id="tab-settings" class="tab-content"></div>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="today">
        <span class="nav-icon">◉</span>
        <span>Today</span>
      </button>
      <button class="nav-btn" data-tab="history">
        <span class="nav-icon">≡</span>
        <span>History</span>
      </button>
      <button class="nav-btn" data-tab="trends">
        <span class="nav-icon">∿</span>
        <span>Trends</span>
      </button>
      <button class="nav-btn" data-tab="settings">
        <span class="nav-icon">⚙</span>
        <span>Settings</span>
      </button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
